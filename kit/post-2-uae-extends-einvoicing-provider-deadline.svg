<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="'Figtree','Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="cinematic" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="
        1 0.02 0.02 0 0
        0.02 0.88 0.02 0 0
        0 0.02 0.88 0 0
        0   0    0    1 0"/>
      <feComponentTransfer>
        <feFuncR type="gamma" amplitude="1" exponent="0.95" offset="0"/>
        <feFuncG type="gamma" amplitude="1" exponent="0.97" offset="0"/>
        <feFuncB type="gamma" amplitude="1" exponent="0.97" offset="0"/>
      </feComponentTransfer>
    </filter>
    <!-- darken: gentle bottom-up scrim. Keeps the top 60% of the photo
         bright and only darkens the lower 40% just enough for text. The
         old version was 0.55–0.98 which buried the photo entirely. -->
    <linearGradient id="darken" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#06060f" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#06060f" stop-opacity="0.15"/>
      <stop offset="78%" stop-color="#06060f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.85"/>
    </linearGradient>
    <!-- textScrim: tight bottom-half scrim used by layouts that need a
         stronger contrast band specifically behind the headline + stat
         block, without darkening the photo's hero zone. -->
    <linearGradient id="textScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#06060f" stop-opacity="0"/>
      <stop offset="40%" stop-color="#06060f" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="60%" stop-color="#06060f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="vignTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#06060f" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.98"/>
    </linearGradient>
    <radialGradient id="vignCenter" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="55%" stop-color="#06060f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#EF5555" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#EF5555" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#EF5555" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brassUnder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8926A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A8926A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A8926A" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.75"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="#06060f"/>

  <image href="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format" xlink:href="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format" x="0" y="-40" width="1080" height="1080" preserveAspectRatio="xMidYMid slice" filter="url(#cinematic)"/>
  <rect width="1080" height="1080" fill="url(#darken)"/>
  <rect width="1080" height="1080" fill="url(#accentGlow)"/>
  <rect x="0" y="0" width="32" height="1080" fill="#EF5555"/>
  <rect x="32" y="0" width="1048" height="2" fill="#EF5555" opacity="0.4"/>

  <text x="80" y="92" font-size="20" font-weight="700" letter-spacing="4" fill="#A8926A" filter="url(#textShadow)">MICS  ·  CFOs PRIVATE INSIGHTS CIRCLE</text>
  <text x="80" y="128" font-size="17" letter-spacing="2" fill="rgba(234,230,222,0.6)" filter="url(#textShadow)">RISK · COMPLIANCE</text>

  <line x1="80" y1="610" x2="200" y2="610" stroke="#EF5555" stroke-width="2" opacity="0.85"/>
  <text x="80" y="660" font-size="22" font-weight="700" letter-spacing="6" fill="#EF5555" filter="url(#textShadow)">REGULATORY SHIFT</text>

  <text x="80" y="780" font-family="'Cormorant Garamond','Georgia',serif" font-size="220" font-weight="500" fill="#ffffff" filter="url(#textShadow)">$13.6M</text>
  <text x="80" y="830" font-size="18" font-weight="600" letter-spacing="3" fill="#EF5555" filter="url(#textShadow)">TAX · VAT · AML · AUDIT · GOVERNANCE · PILLAR 2</text>

  <text x="80" y="888" font-family="'Cormorant Garamond','Georgia',serif" font-size="42" font-weight="600" fill="#EAE6DE" filter="url(#textShadow)">UAE extends eInvoicing provider dead…</text>
  <text x="80" y="934" font-family="'Cormorant Garamond','Georgia',serif" font-size="42" font-weight="600" fill="#EAE6DE" filter="url(#textShadow)">30, 2026 for firms with revenues ove…</text>

  <line x1="1080" y1="0" x2="0" y2="1080" stroke="#EF5555" stroke-width="1" opacity="0.12"/>
  <line x1="1080" y1="60" x2="60" y2="1080" stroke="#EF5555" stroke-width="1" opacity="0.08"/>
  <line x1="1020" y1="0" x2="0" y2="1020" stroke="#A8926A" stroke-width="1" opacity="0.08"/>

  <line x1="40" y1="40" x2="90" y2="40" stroke="#A8926A" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="90" stroke="#A8926A" stroke-width="2"/>
  <line x1="1040" y1="40" x2="990" y2="40" stroke="#A8926A" stroke-width="2"/>
  <line x1="1040" y1="40" x2="1040" y2="90" stroke="#A8926A" stroke-width="2"/>
  <line x1="40" y1="1040" x2="90" y2="1040" stroke="#A8926A" stroke-width="2"/>
  <line x1="40" y1="1040" x2="40" y2="990" stroke="#A8926A" stroke-width="2"/>
  <line x1="1040" y1="1040" x2="990" y2="1040" stroke="#A8926A" stroke-width="2"/>
  <line x1="1040" y1="1040" x2="1040" y2="990" stroke="#A8926A" stroke-width="2"/>

  <rect x="80" y="1000" width="920" height="1" fill="url(#brassUnder)"/>
  <text x="540" y="1042" font-size="13" font-weight="700" letter-spacing="6" fill="rgba(168,146,106,0.7)" text-anchor="middle">MICS INTERNATIONAL</text>
</svg>
