<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="'Figtree','Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="cinematic" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="
        0.98 0.05 0 0 0
        0.05 0.95 0.02 0 0
        0 0.02 0.85 0 0
        0   0    0    1 0"/>
      <feComponentTransfer>
        <feFuncR type="gamma" amplitude="1" exponent="0.95" offset="0"/>
        <feFuncG type="gamma" amplitude="1" exponent="0.97" offset="0"/>
        <feFuncB type="gamma" amplitude="1" exponent="1" offset="0"/>
      </feComponentTransfer>
    </filter>
    <!-- darken: gentle bottom-up scrim. Keeps the top 60% of the photo
         bright and only darkens the lower 40% just enough for text. The
         old version was 0.55–0.98 which buried the photo entirely. -->
    <linearGradient id="darken" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#06060f" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#06060f" stop-opacity="0.15"/>
      <stop offset="78%" stop-color="#06060f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.85"/>
    </linearGradient>
    <!-- textScrim: tight bottom-half scrim used by layouts that need a
         stronger contrast band specifically behind the headline + stat
         block, without darkening the photo's hero zone. -->
    <linearGradient id="textScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#06060f" stop-opacity="0"/>
      <stop offset="40%" stop-color="#06060f" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="60%" stop-color="#06060f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="vignTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#06060f" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.98"/>
    </linearGradient>
    <radialGradient id="vignCenter" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="55%" stop-color="#06060f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#F0C050" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#F0C050" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F0C050" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brassUnder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8926A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A8926A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A8926A" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.75"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="#06060f"/>

  <image href="https://images.unsplash.com/photo-1567521464027-f127ff144326?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format" xlink:href="https://images.unsplash.com/photo-1567521464027-f127ff144326?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format" x="0" y="-40" width="1080" height="1080" preserveAspectRatio="xMidYMid slice" filter="url(#cinematic)"/>
  <rect width="1080" height="1080" fill="url(#vignCenter)"/>
  <rect width="1080" height="1080" fill="url(#accentGlow)" opacity="0.6"/>

  <!-- Top metadata over photo, no card needed -->
  <text x="80" y="92" font-size="20" font-weight="700" letter-spacing="4" fill="#A8926A" filter="url(#textShadow)">MICS  ·  CFOs PRIVATE INSIGHTS CIRCLE</text>
  <text x="80" y="128" font-size="17" letter-spacing="2" fill="rgba(234,230,222,0.65)" filter="url(#textShadow)">CAPITAL · CASH</text>

  <!-- Frosted glass card panel -->
  <rect x="90" y="280" width="900" height="600" rx="6" ry="6"
        fill="rgba(8,8,20,0.62)" stroke="#F0C050" stroke-width="1" opacity="1"/>
  <!-- Inner highlight line -->
  <rect x="98" y="288" width="884" height="1" fill="#F0C050" opacity="0.35"/>
  <!-- Bronze corner ticks -->
  <line x1="90" y1="280" x2="120" y2="280" stroke="#A8926A" stroke-width="2"/>
  <line x1="90" y1="280" x2="90" y2="310" stroke="#A8926A" stroke-width="2"/>
  <line x1="990" y1="880" x2="960" y2="880" stroke="#A8926A" stroke-width="2"/>
  <line x1="990" y1="880" x2="990" y2="850" stroke="#A8926A" stroke-width="2"/>

  <!-- Tier label inside card -->
  <text x="540" y="350" font-size="20" font-weight="700" letter-spacing="6" fill="#F0C050" text-anchor="middle">CAPITAL-MARKETS SIGNAL</text>

  <!-- Centered stat inside card -->
  <text x="540" y="590" font-family="'Cormorant Garamond','Georgia',serif" font-size="200" font-weight="500" fill="#ffffff" text-anchor="middle">$13M</text>
  <text x="540" y="620" font-size="14" font-weight="600" letter-spacing="3" fill="#F0C050" text-anchor="middle">CASH FLOW REVIEWS · CAPITAL STRUCTURING · SPVS · WEALTH MANAGEMENT</text>

  <!-- Headline centered, smaller -->
  <text x="540" y="720" font-family="'Cormorant Garamond','Georgia',serif" font-size="34" font-weight="600" fill="#EAE6DE" text-anchor="middle">Higher finance costs weigh on Cenomi Retail earnings</text>
  <text x="540" y="762" font-family="'Cormorant Garamond','Georgia',serif" font-size="34" font-weight="600" fill="#EAE6DE" text-anchor="middle"></text>

  <!-- Hairline divider inside card bottom -->
  <line x1="440" y1="820" x2="640" y2="820" stroke="#F0C050" stroke-width="1" opacity="0.5"/>

  <rect x="120" y="180" width="60" height="2" fill="#F0C050" opacity="0.7"/>
  <rect x="900" y="180" width="60" height="2" fill="#F0C050" opacity="0.7"/>
  <rect x="120" y="930" width="60" height="2" fill="#A8926A" opacity="0.6"/>
  <rect x="900" y="930" width="60" height="2" fill="#A8926A" opacity="0.6"/>
<g opacity="0.15"><line x1="60" y1="60" x2="60" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="60" x2="300" y2="60" stroke="#F0C050" stroke-width="0.5"/><line x1="100" y1="60" x2="100" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="100" x2="300" y2="100" stroke="#F0C050" stroke-width="0.5"/><line x1="140" y1="60" x2="140" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="140" x2="300" y2="140" stroke="#F0C050" stroke-width="0.5"/><line x1="180" y1="60" x2="180" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="180" x2="300" y2="180" stroke="#F0C050" stroke-width="0.5"/><line x1="220" y1="60" x2="220" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="220" x2="300" y2="220" stroke="#F0C050" stroke-width="0.5"/><line x1="260" y1="60" x2="260" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="260" x2="300" y2="260" stroke="#F0C050" stroke-width="0.5"/><line x1="300" y1="60" x2="300" y2="300" stroke="#F0C050" stroke-width="0.5"/><line x1="60" y1="300" x2="300" y2="300" stroke="#F0C050" stroke-width="0.5"/></g>

  <rect x="80" y="1000" width="920" height="1" fill="url(#brassUnder)"/>
  <text x="540" y="1042" font-size="13" font-weight="700" letter-spacing="6" fill="rgba(168,146,106,0.7)" text-anchor="middle">MICS INTERNATIONAL</text>
</svg>
