<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="'Figtree','Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="cinematic" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="        0.96 0.04 0.0  0 0
        0.02 0.94 0.04 0 0
        0.0  0.04 0.96 0 0
        0   0    0    1 0"/>
    </filter>
    <radialGradient id="vignCenter" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="55%" stop-color="#06060f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.40"/>
    </radialGradient>
    <radialGradient id="accentGlow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#EF5555" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#EF5555" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brassUnder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8926A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A8926A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A8926A" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.75"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="#06060f"/>
  <image href="https://images.unsplash.com/photo-1466611653911-95081537e5b7?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format"
         xlink:href="https://images.unsplash.com/photo-1466611653911-95081537e5b7?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format"
         x="0" y="-40" width="1080" height="1080" preserveAspectRatio="xMidYMid slice" filter="url(#cinematic)"/>
  <rect width="1080" height="1080" fill="url(#vignCenter)"/>
  <rect width="1080" height="1080" fill="url(#accentGlow)" opacity="0.6"/>

  <text x="80" y="92" font-size="20" font-weight="700" letter-spacing="4" fill="#A8926A" filter="url(#textShadow)">MICS  ·  CFOs PRIVATE INSIGHTS CIRCLE</text>
  <text x="80" y="128" font-size="17" letter-spacing="2" fill="rgba(234,230,222,0.65)" filter="url(#textShadow)">RISK  ·  COMPLIANCE</text>

  <rect x="90" y="280" width="900" height="600" rx="6" ry="6" fill="rgba(8,8,20,0.62)" stroke="#EF5555" stroke-width="1"/>
  <rect x="98" y="288" width="884" height="1" fill="#EF5555" opacity="0.35"/>
  <line x1="90" y1="280" x2="120" y2="280" stroke="#A8926A" stroke-width="2"/>
  <line x1="90" y1="280" x2="90" y2="310" stroke="#A8926A" stroke-width="2"/>
  <line x1="990" y1="880" x2="960" y2="880" stroke="#A8926A" stroke-width="2"/>
  <line x1="990" y1="880" x2="990" y2="850" stroke="#A8926A" stroke-width="2"/>

  <text x="540" y="350" font-size="20" font-weight="700" letter-spacing="6" fill="#EF5555" text-anchor="middle">REGULATORY SHIFT  ·  60-DAY WINDOW</text>

  <text x="540" y="580" font-family="'Cormorant Garamond','Georgia',serif" font-size="200" font-weight="500" fill="#ffffff" text-anchor="middle">€4B</text>
  <text x="540" y="620" font-size="14" font-weight="600" letter-spacing="3" fill="#EF5555" text-anchor="middle">EU ETS · INDIRECT EMISSIONS INCLUSION</text>

  <text x="540" y="720" font-family="'Cormorant Garamond','Georgia',serif" font-size="34" font-weight="600" fill="#EAE6DE" text-anchor="middle">CBAM math shifts twice</text>
  <text x="540" y="762" font-family="'Cormorant Garamond','Georgia',serif" font-size="34" font-weight="600" fill="#EAE6DE" text-anchor="middle">before the June decision.</text>

  <line x1="440" y1="820" x2="640" y2="820" stroke="#EF5555" stroke-width="1" opacity="0.5"/>

  <!-- THEME DECORATIONS — bracket-frame + diagonal-slash (compliance/risk) -->
  <line x1="900" y1="50" x2="1040" y2="50" stroke="#EF5555" stroke-width="3" opacity="0.8"/>
  <line x1="1040" y1="50" x2="1040" y2="180" stroke="#EF5555" stroke-width="3" opacity="0.8"/>
  <line x1="40" y1="900" x2="40" y2="1040" stroke="#EF5555" stroke-width="3" opacity="0.8"/>
  <line x1="40" y1="1040" x2="180" y2="1040" stroke="#EF5555" stroke-width="3" opacity="0.8"/>
  <line x1="1080" y1="0" x2="0" y2="1080" stroke="#EF5555" stroke-width="1" opacity="0.10"/>
  <line x1="1080" y1="60" x2="60" y2="1080" stroke="#EF5555" stroke-width="1" opacity="0.06"/>

  <rect x="80" y="1000" width="920" height="1" fill="url(#brassUnder)"/>
  <text x="540" y="1042" font-size="13" font-weight="700" letter-spacing="6" fill="rgba(168,146,106,0.7)" text-anchor="middle">MICS INTERNATIONAL</text>
</svg>
