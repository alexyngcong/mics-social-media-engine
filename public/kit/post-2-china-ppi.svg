<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="'Figtree','Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="cinematic" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="
        0.55 0.05 0.05 0 0
        0.05 0.55 0.10 0 0
        0.10 0.15 0.85 0 0
        0   0    0    1 0"/>
    </filter>
    <linearGradient id="darken" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06060f" stop-opacity="0"/>
      <stop offset="60%" stop-color="#06060f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06060f" stop-opacity="0.98"/>
    </linearGradient>
    <radialGradient id="accentGlow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#5B8DEE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5B8DEE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brassUnder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8926A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A8926A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A8926A" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.75"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="leftHalf"><rect x="0" y="0" width="595" height="1080"/></clipPath>
  </defs>

  <rect width="1080" height="1080" fill="#06060f"/>

  <g clip-path="url(#leftHalf)">
    <image href="https://images.unsplash.com/photo-1521295121783-8a321d551ad2?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format"
           xlink:href="https://images.unsplash.com/photo-1521295121783-8a321d551ad2?w=1600&amp;q=80&amp;fit=crop&amp;crop=entropy&amp;auto=format"
           x="0" y="-40" width="700" height="1080" preserveAspectRatio="xMidYMid slice" filter="url(#cinematic)"/>
    <rect width="595" height="1080" fill="url(#darken)" opacity="0.55"/>
    <rect width="595" height="1080" fill="url(#fadeRight)"/>
  </g>

  <rect x="595" y="0" width="485" height="1080" fill="#0a0a18"/>
  <rect x="595" y="0" width="485" height="1080" fill="url(#accentGlow)" opacity="0.7"/>
  <rect x="593" y="80" width="2" height="920" fill="#5B8DEE" opacity="0.6"/>
  <rect x="0" y="1078" width="1080" height="2" fill="#5B8DEE"/>

  <text x="60" y="92" font-size="20" font-weight="700" letter-spacing="4" fill="#A8926A" filter="url(#textShadow)">MICS</text>
  <text x="60" y="128" font-size="14" letter-spacing="2" fill="rgba(234,230,222,0.7)" filter="url(#textShadow)">CFOs PRIVATE INSIGHTS CIRCLE</text>

  <line x1="640" y1="200" x2="760" y2="200" stroke="#5B8DEE" stroke-width="2"/>
  <text x="640" y="245" font-size="19" font-weight="700" letter-spacing="5" fill="#5B8DEE">PRINT OF THE DAY</text>
  <text x="640" y="275" font-size="14" letter-spacing="3" fill="#5B8DEE" opacity="0.8">30-DAY WINDOW</text>

  <text x="640" y="520" font-family="'Cormorant Garamond','Georgia',serif" font-size="180" font-weight="500" fill="#ffffff">2.8%</text>
  <text x="640" y="560" font-size="15" font-weight="600" letter-spacing="3" fill="#5B8DEE">CHINA PPI  ·  45-MONTH HIGH</text>

  <text x="640" y="680" font-family="'Cormorant Garamond','Georgia',serif" font-size="34" font-weight="600" fill="#EAE6DE">Supply-side cost shock</text>
  <text x="640" y="720" font-family="'Cormorant Garamond','Georgia',serif" font-size="34" font-weight="600" fill="#EAE6DE">passed to factory gates.</text>

  <text x="640" y="950" font-size="14" font-style="italic" fill="#B0AAB0">UAE supplier repricing in 60–90 days.</text>

  <!-- THEME DECORATIONS — orbital-rings + corner-ticks (geopolitics/shipping) -->
  <circle cx="940" cy="240" r="60" fill="none" stroke="#5B8DEE" stroke-width="1" opacity="0.35"/>
  <circle cx="940" cy="240" r="100" fill="none" stroke="#5B8DEE" stroke-width="1" opacity="0.22"/>
  <circle cx="940" cy="240" r="150" fill="none" stroke="#5B8DEE" stroke-width="1" opacity="0.12"/>
  <circle cx="940" cy="240" r="4" fill="#5B8DEE" opacity="0.8"/>
  <line x1="40" y1="40" x2="90" y2="40" stroke="#A8926A" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="90" stroke="#A8926A" stroke-width="2"/>
  <line x1="40" y1="1040" x2="90" y2="1040" stroke="#A8926A" stroke-width="2"/>
  <line x1="40" y1="1040" x2="40" y2="990" stroke="#A8926A" stroke-width="2"/>

  <rect x="80" y="1000" width="920" height="1" fill="url(#brassUnder)"/>
  <text x="540" y="1042" font-size="13" font-weight="700" letter-spacing="6" fill="rgba(168,146,106,0.7)" text-anchor="middle">MICS INTERNATIONAL</text>
</svg>
